# Local dev datastores for QA Prism.
#   docker compose -f infra/docker-compose.yml up -d
# Matches the defaults in .env.example (DATABASE_URL / REDIS_URL).
services:
  postgres:
    image: postgres:16
    container_name: qaprism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qaprism
      POSTGRES_PASSWORD: qaprism
      POSTGRES_DB: qaprism
    ports:
      - "5432:5432"
    volumes:
      - qaprism_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qaprism -d qaprism"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: qaprism-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qaprism_pg:
