# QA Prism — full self-hosted stack. Only Caddy is exposed to the network;
# Postgres, Redis, the API and the web app stay on the internal Docker network.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qaprism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: qaprism
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaprism']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://qaprism:${POSTGRES_PASSWORD}@postgres:5432/qaprism
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      COMPANY_NAME: ${COMPANY_NAME:-Code and Theory}
      SCAN_RETENTION_MINUTES: ${SCAN_RETENTION_MINUTES:-60}
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: 1gb # headroom for Chromium
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:3001
      APP_PASSWORD: ${APP_PASSWORD}
      COMPANY_NAME: ${COMPANY_NAME:-Code and Theory}
      SCAN_RETENTION_MINUTES: ${SCAN_RETENTION_MINUTES:-60}
      FUN_ENABLED: ${FUN_ENABLED:-true}
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - '80:80'
      - '443:443'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
