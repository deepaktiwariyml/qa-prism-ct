# QA Prism — self-hosted stack that plugs into an EXISTING Traefik reverse proxy
# (e.g. the Hostinger n8n VPS). Traefik terminates TLS and routes
# ${SITE_ADDRESS} -> web:3000. Postgres/Redis/API stay private on this project's
# own network; only `web` joins Traefik's shared network.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qaprism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: qaprism
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaprism']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://qaprism:${POSTGRES_PASSWORD}@postgres:5432/qaprism
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      COMPANY_NAME: ${COMPANY_NAME:-Code and Theory}
      SCAN_RETENTION_MINUTES: ${SCAN_RETENTION_MINUTES:-60}
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: 1gb # headroom for Chromium
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:3001
      APP_PASSWORD: ${APP_PASSWORD}
      COMPANY_NAME: ${COMPANY_NAME:-Code and Theory}
      SCAN_RETENTION_MINUTES: ${SCAN_RETENTION_MINUTES:-60}
      FUN_ENABLED: ${FUN_ENABLED:-true}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.qaprism.rule=Host(`${SITE_ADDRESS}`)
      - traefik.http.routers.qaprism.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.qaprism.tls=true
      - traefik.http.routers.qaprism.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.services.qaprism.loadbalancer.server.port=3000
    restart: unless-stopped

# `default` is this project's private network (api ↔ postgres ↔ redis ↔ web).
# `traefik` is the EXISTING shared proxy network — declared external so we join
# it rather than create it.
networks:
  default:
  traefik:
    name: ${TRAEFIK_NETWORK}
    external: true

volumes:
  pgdata:
