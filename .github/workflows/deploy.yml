name: Deploy

# Deploys on every push to main (and on manual dispatch). Secrets live in
# GitHub → Settings → Secrets and variables → Actions.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/QA-PRISM
            git fetch --all
            git reset --hard origin/main
            # Rewrite .env from GitHub secrets (never committed to the repo).
            umask 077
            cat > .env <<EOF
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            APP_PASSWORD=${{ secrets.APP_PASSWORD }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GITHUB_TOKEN=${{ secrets.APP_GITHUB_TOKEN }}
            COMPANY_NAME=${{ vars.COMPANY_NAME }}
            SCAN_RETENTION_MINUTES=${{ vars.SCAN_RETENTION_MINUTES }}
            FUN_ENABLED=${{ vars.FUN_ENABLED }}
            SITE_ADDRESS=${{ vars.SITE_ADDRESS }}
            EOF
            docker compose up -d --build
            docker image prune -f
