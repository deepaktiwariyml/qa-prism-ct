<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Studio</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        -webkit-app-region: drag; /* the frameless window is draggable */
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #e2e8f0;
        background: radial-gradient(1200px 800px at 50% 30%, #1e1b4b 0%, #0b1020 60%, #070a17 100%);
        user-select: none;
      }
      .mark {
        width: 84px; height: 84px; border-radius: 22px;
        background: linear-gradient(160deg, #7c3aed, #4f46e5);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 40px rgba(79, 70, 229, 0.45);
      }
      .mark svg { width: 46px; height: 46px; }
      .title { font-size: 20px; font-weight: 600; letter-spacing: 0.2px; color: #f8fafc; }
      .sub { font-size: 13px; color: #94a3b8; margin-top: -12px; }
      .spinner {
        width: 22px; height: 22px; border-radius: 50%;
        border: 2.5px solid rgba(148, 163, 184, 0.25);
        border-top-color: #a5b4fc;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4.5 12.5l5 5 10-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="title">QA Studio</div>
    <div class="sub">Starting up…</div>
    <div class="spinner"></div>
  </body>
</html>
