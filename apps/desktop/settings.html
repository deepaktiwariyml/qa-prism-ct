<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Prism — Settings</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #0f172a;
        background: #f8fafc;
        padding: 24px;
      }
      h1 { font-size: 18px; margin: 0 0 2px; }
      p.sub { margin: 0 0 20px; color: #64748b; font-size: 13px; }
      label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin: 14px 0 4px; }
      .hint { font-weight: 400; color: #94a3b8; }
      input {
        width: 100%; padding: 9px 11px; font-size: 13px;
        border: 1px solid #cbd5e1; border-radius: 9px; outline: none; background: #fff;
      }
      input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
      .row { display: flex; gap: 12px; }
      .row > div { flex: 1; }
      .actions { display: flex; align-items: center; gap: 12px; margin-top: 26px; }
      button {
        border: 0; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600;
        color: #fff; cursor: pointer;
        background: linear-gradient(90deg, #4f46e5, #7c3aed);
      }
      button:disabled { opacity: .5; cursor: default; }
      button.secondary { background: #fff; color: #475569; border: 1px solid #cbd5e1; }
      .note { font-size: 12px; color: #64748b; margin-top: 8px; line-height: 1.5; }
      .saved { color: #059669; font-size: 13px; font-weight: 600; }
      a { color: #4f46e5; }
    </style>
  </head>
  <body>
    <h1>Settings</h1>
    <p class="sub">Your keys are stored securely on this Mac (system keychain) and never leave it.</p>

    <label>Anthropic API key <span class="hint">— required</span></label>
    <input id="anthropicApiKey" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false" />
    <div class="note">Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>. Usage bills to this key.</div>

    <div class="row">
      <div>
        <label>Model <span class="hint">(quality)</span></label>
        <input id="anthropicModel" type="text" placeholder="claude-sonnet-4-6" spellcheck="false" />
      </div>
      <div>
        <label>Fast model <span class="hint">(low-stakes)</span></label>
        <input id="anthropicFastModel" type="text" placeholder="claude-haiku-4-5" spellcheck="false" />
      </div>
    </div>

    <label>GitHub token <span class="hint">— optional, for PR impact on private repos</span></label>
    <input id="githubToken" type="password" placeholder="ghp_…" autocomplete="off" spellcheck="false" />

    <label>Jira base URL <span class="hint">— optional, for ticket links</span></label>
    <input id="jiraBaseUrl" type="text" placeholder="https://your-org.atlassian.net" spellcheck="false" />

    <div class="actions">
      <button id="save">Save &amp; restart</button>
      <button id="cancel" class="secondary">Cancel</button>
      <span id="status"></span>
    </div>
    <p class="note">Saving restarts the app so the new settings take effect everywhere.</p>

    <script>
      const $ = (id) => document.getElementById(id);
      const fields = ['anthropicApiKey', 'anthropicModel', 'anthropicFastModel', 'githubToken', 'jiraBaseUrl'];

      async function load() {
        const s = await window.qaprism.getSettings();
        for (const f of fields) $(f).value = s[f] ?? '';
      }
      $('save').addEventListener('click', async () => {
        const settings = {};
        for (const f of fields) settings[f] = $(f).value.trim();
        if (!settings.anthropicApiKey) {
          $('status').textContent = 'An Anthropic API key is required.';
          $('status').style.color = '#dc2626';
          return;
        }
        $('save').disabled = true;
        $('status').style.color = '#64748b';
        $('status').textContent = 'Saving…';
        try {
          const res = await window.qaprism.saveSettings(settings);
          if (res && res.ok === false) throw new Error(res.error || 'Save failed');
          $('status').style.color = '#059669';
          $('status').textContent = 'Saved ✓';
          // The main process closes this window and refreshes the app shortly.
        } catch (e) {
          $('save').disabled = false;
          $('status').style.color = '#dc2626';
          $('status').textContent = 'Could not save: ' + (e && e.message ? e.message : e);
        }
      });
      $('cancel').addEventListener('click', () => window.close());
      load();
    </script>
  </body>
</html>
